<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Orquestador SDN - 5G Slicing</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
    <h1>Despliegue de Network Slices</h1>
    <p style="text-align: center;">Introduce los parámetros SLA para aprovisionar la red.</p>
    
    <form id="sliceForm" onsubmit="submitSlice(event)">
        <div id="classesContainer">
            <!-- Clase QoS inicial -->
            <div class="qos-class">
                <div class="qos-header">
                    <h3 class="class-title">Clase de QoS</h3>
                    <button type="button" class="btn-remove" onclick="removeClass(this)">🗑️ Eliminar</button>
                </div>
                <label>Burst (Bytes):</label>
                <input type="number" name="burst" value="1500" required>
                <label>CIR (Mbps):</label>
                <input type="number" name="cir" placeholder="Ej: 50" required>
                <label>Delay máximo (ms):</label>
                <input type="number" name="delay" placeholder="Ej: 10" required>
            </div>
        </div>

        <div class="buttons">
            <button type="button" class="btn-add" onclick="addClass()">+ Añadir Clase</button>
            <button type="submit" class="btn-submit">Lanzar Petición</button>
        </div>
    </form>

    <!-- Caja para mostrar el resultado -->
    <div id="result"></div>

    <!-- Sección de Slices Activas -->
    <div class="slices-panel" id="slicesPanel" style="display: block;">
        <h2>Slices Activas</h2>
    
        <!-- Aquí es donde Javascript inyectará las cajas mágicamente -->
        <div id="slicesActivasContainer"></div>
    
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
